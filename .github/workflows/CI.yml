#action to make npm tests
name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        # Indicamos dónde está el archivo de dependencias
        cache: 'npm'
        cache-dependency-path: './mi-portfolio/package-lock.json'

    - name: Install dependencies
      # Entramos en la carpeta antes de instalar
      run: npm ci
      working-directory: ./mi-portfolio

    - name: Build project
      # Entramos en la carpeta antes de buildear
      run: npm run build --if-present
      working-directory: ./mi-portfolio
